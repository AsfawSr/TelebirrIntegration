spring.profiles.active=${SPRING_PROFILES_ACTIVE:sandbox}

# Shared Telebirr settings loaded from environment variables.
# In the prod profile, required TELEBIRR_* values are validated at startup.
telebirr.fabric-app-id=${TELEBIRR_FABRIC_APP_ID:}
telebirr.app-secret=${TELEBIRR_APP_SECRET:}
telebirr.merchant-app-id=${TELEBIRR_MERCHANT_APP_ID:}
telebirr.merchant-code=${TELEBIRR_MERCHANT_CODE:}
telebirr.merchant-private-key=${TELEBIRR_MERCHANT_PRIVATE_KEY:}
telebirr.test-phone-number=${TELEBIRR_TEST_PHONE_NUMBER:}
telebirr.base-url=${TELEBIRR_BASE_URL:}
telebirr.notify-url=${TELEBIRR_NOTIFY_URL:}
telebirr.tls.trust-store-path=${TELEBIRR_TLS_TRUST_STORE_PATH:}
telebirr.tls.trust-store-password=${TELEBIRR_TLS_TRUST_STORE_PASSWORD:}
telebirr.tls.trust-store-type=${TELEBIRR_TLS_TRUST_STORE_TYPE:JKS}
telebirr.mock-enabled=${TELEBIRR_MOCK_ENABLED:false}

